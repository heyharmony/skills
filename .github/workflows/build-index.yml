name: Build Index

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate index.json + individual JSONs
        env:
          CDN_BUCKET: ${{ secrets.CDN_BUCKET }}
          CDN_BASE_URL: ${{ vars.CDN_BASE_URL }}
          CDN_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          CDN_ACCESS_KEY: ${{ secrets.CDN_ACCESS_KEY }}
          CDN_SECRET_KEY: ${{ secrets.CDN_SECRET_KEY }}
        run: node scripts/build-index.js

      - name: Publish to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ vars.R2_ENDPOINT }}
          AWS_REGION: auto
        run: |
          aws s3 cp index.json s3://${{ vars.R2_BUCKET }}/marketplace/skills/index.json \
            --endpoint-url $AWS_ENDPOINT_URL
          aws s3 sync dist/ s3://${{ vars.R2_BUCKET }}/marketplace/skills/ \
            --endpoint-url $AWS_ENDPOINT_URL

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json skills/
          git diff --cached --quiet || git commit -m "chore: regenerate index + update CDN urls [skip ci]"
          git push
